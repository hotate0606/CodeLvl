<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>キャラ分割ツール</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 24px; }
    h2 { color: #50c878; }
    label { display: block; margin: 10px 0 4px; }
    input[type=number] { width: 60px; padding: 4px; }
    button { margin-top: 14px; padding: 8px 20px; background: #50c878; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: bold; }
    #output { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 24px; }
    .card { background: #2a2a4a; border-radius: 8px; padding: 12px; text-align: center; }
    .card canvas { display: block; max-width: 240px; background: repeating-conic-gradient(#333 0% 25%, #444 0% 50%) 0 0 / 16px 16px; border-radius: 4px; }
    .card a { display: block; margin-top: 8px; color: #ffd24a; text-decoration: none; font-weight: bold; }
    .card a:hover { text-decoration: underline; }
    .info { color: #aaa; font-size: 12px; margin-top: 6px; }
  </style>
</head>
<body>
  <h2>🦎 キャラ分割ツール</h2>
  <p>横に並んだキャラ画像を分割して背景を透過にします。</p>

  <label>画像を選ぶ：
    <input type="file" id="fileInput" accept="image/*">
  </label>
  <label>分割数（横）：
    <input type="number" id="cols" value="3" min="1" max="10">
  </label>
  <label>背景除去の精度（大きいほど広く消える）：
    <input type="number" id="tol" value="38" min="10" max="100">
  </label>
  <button onclick="process()">分割＆背景除去</button>

  <div id="output"></div>

  <script>
    function floodFill(d, w, h, seedX, seedY, tol) {
      const si = (seedY * w + seedX) * 4;
      if (d[si + 3] === 0) return;
      const bgR = d[si], bgG = d[si + 1], bgB = d[si + 2];
      const visited = new Uint8Array(w * h);
      const stack = [];
      function push(x, y) {
        if (x >= 0 && x < w && y >= 0 && y < h && !visited[y * w + x])
          stack.push(x, y);
      }
      push(seedX, seedY);
      while (stack.length) {
        const y = stack.pop(), x = stack.pop();
        if (visited[y * w + x]) continue;
        visited[y * w + x] = 1;
        const i = (y * w + x) * 4;
        if (d[i + 3] === 0) continue;
        const dr = d[i] - bgR, dg = d[i+1] - bgG, db = d[i+2] - bgB;
        if (dr*dr + dg*dg + db*db < tol*tol) {
          d[i + 3] = 0;
          push(x-1,y); push(x+1,y); push(x,y-1); push(x,y+1);
        }
      }
    }

    function removeBackground(ctx, w, h, tol) {
      const id = ctx.getImageData(0, 0, w, h);
      const d = id.data;

      // 四辺からフラッドフィル（背景除去）
      for (let x = 0; x < w; x++) { floodFill(d, w, h, x, 0,   tol); floodFill(d, w, h, x, h-1, tol); }
      for (let y = 0; y < h; y++) { floodFill(d, w, h, 0, y,   tol); floodFill(d, w, h, w-1, y, tol); }

      // 影ディスク除去：底部中央から2回目のフラッドフィル
      for (let sy = h - 1; sy >= Math.floor(h * 0.78); sy--) {
        const si = (sy * w + Math.floor(w / 2)) * 4;
        if (d[si + 3] > 0) { floodFill(d, w, h, Math.floor(w / 2), sy, 55); break; }
      }

      ctx.putImageData(id, 0, 0);
    }

    function process() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) { alert('画像を選んでください'); return; }
      const cols = parseInt(document.getElementById('cols').value);
      const tol  = parseInt(document.getElementById('tol').value);

      const img = new Image();
      img.onload = () => {
        const colW = Math.floor(img.width / cols);
        const h    = img.height;
        document.getElementById('output').innerHTML = '';

        for (let i = 0; i < cols; i++) {
          const canvas = document.createElement('canvas');
          canvas.width  = colW;
          canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, -i * colW, 0);
          removeBackground(ctx, colW, h, tol);

          const baseName = file.name.replace(/\.[^.]+$/, '');
          const outName  = `${baseName}-${i+1}.png`;

          const card = document.createElement('div');
          card.className = 'card';
          const a = document.createElement('a');
          a.download = outName;
          a.href = canvas.toDataURL('image/png');
          a.textContent = `💾 ${outName}`;
          const info = document.createElement('div');
          info.className = 'info';
          info.textContent = `${colW} × ${h} px`;
          card.appendChild(canvas);
          card.appendChild(a);
          card.appendChild(info);
          document.getElementById('output').appendChild(card);
        }
      };
      img.src = URL.createObjectURL(file);
    }
  </script>
</body>
</html>
