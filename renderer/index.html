<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>CodeLv</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="card">
    <div id="left">
      <div id="topbar">
        <span id="level-badge">Lv.1</span>
        <div id="coin-area">
          <span id="coins">🪙 0</span>
          <div id="coin-meter" title="コインプール（30分で満タン／クリックで受取）">
            <div class="cseg"><div class="cfill"></div></div>
            <div class="cseg"><div class="cfill"></div></div>
            <div class="cseg"><div class="cfill"></div></div>
          </div>
          <span id="coin-count">30:00</span>
        </div>
      </div>
      <div id="scene-wrap">
        <canvas id="scene" width="320" height="256"></canvas>
        <div id="speech"></div>
      </div>
      <button id="feed-btn">🍖 ごはんをあげる (10🪙)</button>
    </div>

    <div id="params">
      <div class="ptitle">ステータス</div>

      <div class="param" data-key="condition">
        <div class="phead">
          <span class="picon">⚡</span><span class="pname">じょうたい</span>
        </div>
        <div class="bar"><div class="fill"></div></div>
      </div>

      <div class="param" data-key="affection">
        <div class="phead">
          <span class="picon">💖</span><span class="pname">なつき</span>
          <span id="evo-lock-badge" class="hidden">🔒</span>
        </div>
        <div class="bar"><div class="fill"></div></div>
      </div>

      <div class="param" data-key="hunger">
        <div class="phead">
          <span class="picon">🍖</span><span class="pname">くうふく</span>
        </div>
        <div class="bar"><div class="fill"></div></div>
      </div>

      <div class="param" data-key="mood">
        <div class="phead">
          <span class="picon">🎵</span><span class="pname">きげん</span>
        </div>
        <div class="bar"><div class="fill"></div></div>
      </div>

      <div id="toolbar">
        <button class="tool-btn" id="box-btn">📦 ボックス</button>
        <button class="tool-btn" id="reset-evo-btn" title="卵の状態に戻して最初から確認する">🥚 卵にもどす</button>
      </div>
    </div>

    <!-- アイテムボックス モーダル -->
    <div id="itembox" class="hidden">
      <div id="itembox-head">
        <span>📦 ボックス</span>
        <button id="box-close">✕</button>
      </div>
      <div id="itembox-tabs">
        <button class="tab active" data-tag="all">すべて</button>
        <button class="tab" data-tag="egg">卵</button>
        <button class="tab" data-tag="monster">モンスター</button>
        <button class="tab" data-tag="furniture">家具</button>
        <button class="tab" data-tag="decoration">装飾品</button>
        <button class="tab" data-tag="theme">テーマ</button>
        <button class="tab" data-tag="item">アイテム</button>
      </div>
      <div id="itembox-grid"></div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
